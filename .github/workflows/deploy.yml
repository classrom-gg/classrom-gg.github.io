name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate game pages
        run: OUT_DIR=_site node generate-games.js

      - name: Copy static files to _site
        run: |
          cp index.html _site/
          cp games.json _site/
          [ -f game.html ] && cp game.html _site/
          for f in privacy.html terms.html dmca.html contact.html; do
            [ -f "$f" ] && cp "$f" _site/
          done
          for f in google*.html bing*.html robots.txt sitemap.xml favicon.*; do
            [ -f "$f" ] && cp "$f" _site/
          done
          [ -d assets ] && cp -r assets _site/
          [ -d data ]   && cp -r data   _site/
          echo "--- _site root ---"
          ls _site/

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - id: deployment
        uses: actions/deploy-pages@v4